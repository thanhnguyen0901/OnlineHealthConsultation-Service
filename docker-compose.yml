version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: health_consultation_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: health_consultation_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - health_consultation_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthuser -d health_consultation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  health_consultation_network:
    driver: bridge
